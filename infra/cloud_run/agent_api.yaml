apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agent-api
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/trace-ca/agent-api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "2Gi"
              cpu: "1"
          env:
            - name: GCP_PROJECT_ID
              value: PROJECT_ID
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: latest
